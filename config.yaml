splunk:
  host: localhost
  port: 8000
  token: ""  # Set SPLUNK_TOKEN in .env — that takes priority over this field
  verify_ssl: false

demo_mode: true

ai:
  provider: gemini
  gemini_model: gemini-2.0-flash

agent:
  max_investigation_steps: 10
  confidence_threshold: 0.6

output:
  reports_dir: ./reports
  logs_dir: ./logs
